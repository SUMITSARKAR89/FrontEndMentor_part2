    />

      src="https://cdnjs.cloudflare.com/ajax/libs/ionicons/7.4.0/esm/ionicons.min.js"
      integrity="sha512-heZj7rPbZHWyOEhE34vsJkzj2DKK2mZ9D3jjMkXQJ0uMGu/m5iOty+le26NL1eFZ5+qa4XBYcflwYwITwCWufw=="

      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- favicon section   --------------------------------->
    <link
      rel="shortcut icon"
      href="https://framerusercontent.com/images/QbZPUDfFXUG8DRCcKmLXFnnmWA.png"
      type="image/x-icon"
    />
    <script src="https://unpkg.com/scrollreveal@4.0.0/dist/scrollreveal.min.js"></script>

    <title>Frontend Mentor | Base Apparel coming soon page</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body>
    <section>
      <div class="container">
        <div class="card">
          <img src="images/logo.svg" alt="" class="logo" />
          <h1><span>We're</span>coming soon</h1>
          <p class="p">
            Hello fellow shoppers! We're currently building our new fashion
            store. Add your email below to stay up-to-date with announcements
            and our launch deals.
          </p>
          <form action="">
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Email Address"
            />
            <button type="submit">
              <img src="images/icon-arrow.svg" alt="" class="arrowIcon" />
            </button>
            <img src="images/icon-error.svg" alt="" class="errorIcon" />
          </form>
          <div class="btntxt">
            <p class="showmsg">Thanks for subscribtion</p>
            <p class="errormsg">Please provide a Valid email</p>
          </div>
        </div>
        <div class="cardImg">
          <img src="images/hero-desktop.jpg" alt="" class="deskimg" />
          <!-- <img src="images/hero-mobile.jpg" alt="" class="mobimg"> -->
        </div>
      </div>
    </section>
    <!--    -->

    <footer>
      <p class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="#">sumit sarkar</a>.
      </p>
    </footer>

    <script>
      const form = document.querySelector("form");
      const errorIcon = document.querySelector(".errorIcon");
      const showmsg = document.querySelector(".showmsg");
      const errormsg = document.querySelector(".errormsg");
      const email = document.querySelector("#email");

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const emailValue = email.value.trim();
        const pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

        if (emailValue === "" || !pattern.test(emailValue)) {
          // ❌ Error State
          errormsg.style.display = "block";
          errorIcon.style.display = "block";
          showmsg.style.display = "none";

          form.classList.add("error-border");

          setTimeout(() => {
            errormsg.style.display = "none";
            errorIcon.style.display = "none";

            form.classList.remove("error-border");
          }, 2000);
        } else {
          // ✅ Success State
          errormsg.style.display = "none";
          errorIcon.style.display = "none";
          showmsg.style.display = "block";
          form.classList.remove("error-border");

          setTimeout(() => {
            showmsg.style.display = "none";
          }, 2000);
        }
        form.reset();
      });
    </script>
  </body>
</html>
