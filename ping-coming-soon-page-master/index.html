    <!-- this is google font section   --------------------------------->

    />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/ionicons/7.4.0/esm/ionicons.min.js"
      integrity="sha512-heZj7rPbZHWyOEhE34vsJkzj2DKK2mZ9D3jjMkXQJ0uMGu/m5iOty+le26NL1eFZ5+qa4XBYcflwYwITwCWufw=="

      referrerpolicy="no-referrer"

      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- favicon section   --------------------------------->
    <link
      rel="shortcut icon"
      href="https://framerusercontent.com/images/QbZPUDfFXUG8DRCcKmLXFnnmWA.png"
      type="image/x-icon"
    />
    <script src="https://unpkg.com/scrollreveal@4.0.0/dist/scrollreveal.min.js"></script>

    <title>Frontend Mentor | Ping coming soon page</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body>
    <section>
      <div class="container">
        <div class="card">
          <img src="images/logo.svg" alt="" class="logo" />
          <h1>We are launching <span>soon!</span></h1>
          <p class="sub">Subscribe and get notified</p>
          <form action="#">
            <div class="input-grp">
              <input
                type="email"
                name="email"
                id="email"
                placeholder="example@gmail.com"
              />
              <small class="error">Please provide a valid email address</small>
            </div>
            <button type="submit">Notify Me</button>
          </form>
        </div>
        <div class="imgcard">
          <img src="images/illustration-dashboard.png" alt="" />
        </div>
      </div>
    </section>
    <!--  -->

    <footer>
      <div class="social">
        <i class="fa-brands fa-facebook-f"></i>
        <i class="fa-brands fa-twitter"></i>
        <i class="fa-brands fa-instagram"></i>
      </div>
      <p>&copy; Copyright Ping. All rights reserved.</p>
      <p class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="#">sumit sarkar</a>.
      </p>
    </footer>

   <script>
      const form = document.querySelector("form");
      

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.querySelector("#email");
      const errorTxt = document.querySelector(".error");
        const emailValue = email.value.trim();
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (emailValue == "" || !emailPattern.test(emailValue)) {
          errorTxt.style.opacity = "1";
          email.classList.add("errorborder");

          setTimeout(() => {
            errorTxt.style.opacity = "0";
          }, 5000);

          setTimeout(() => {
            email.classList.remove("errorborder");
          }, 5000);
        } else {
          errorTxt.style.opacity = "0";
          email.classList.remove("errorborder");
          alert("Successfully subscribed!");
          
          form.reset();
        }
      });
    </script>
  </body>
</html>
