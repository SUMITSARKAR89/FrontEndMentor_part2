      integrity="sha512-heZj7rPbZHWyOEhE34vsJkzj2DKK2mZ9D3jjMkXQJ0uMGu/m5iOty+le26NL1eFZ5+qa4XBYcflwYwITwCWufw=="

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="

    />

    <!-- favicon section   --------------------------------->
    <link
      rel="shortcut icon"
      href="https://framerusercontent.com/images/QbZPUDfFXUG8DRCcKmLXFnnmWA.png"
      type="image/x-icon"
    />

    <title>Frontend Mentor | [Challenge Name Here]</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body>
    <section>
      <div class="priceToggle">
        <h4>Our Pricing</h4>
        <div class="tooglecard">
          <p>Annually</p>
          <div class="toggleBtn">
            <div class="dot"></div>
          </div>
          <p>Monthly</p>
        </div>
      </div>
      <div class="container">
        <div class="card">
          <h5>basic</h5>
          <p id="price1"><span>$</span>19.99</p>
          <p>500 GB Storage</p>
          <p>2 Users Allowed</p>
          <p>Send up to 3 GB</p>
          <button class="primary-btn">Learn More</button>
        </div>
        <div class="card blu">
          <h5>Professional</h5>
          <p id="price2"><span>$</span>24.99</p>
          <p>1 TB Storage</p>
          <p>5 Users Allowed</p>
          <p>Send up to 10 GB</p>
          <button class="secondary-btn">Learn More</button>
        </div>
        <div class="card">
          <h5>Master</h5>
          <p id="price3"><span>$</span>39.99</p>
          <p>2 TB Storage</p>
          <p>10 Users Allowed</p>
          <p>Send up to 20 GB</p>
          <button class="primary-btn">Learn More</button>
        </div>
      </div>
    </section>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">sumit sarkar</a>.
    </div>

    <script>
      const toggleBtn = document.querySelector(".toggleBtn");
      const dot = document.querySelector(".dot");

      const price1 = document.getElementById("price1");
      const price2 = document.getElementById("price2");
      const price3 = document.getElementById("price3");

      // toggle state maintain
      let yearly = true;

      toggleBtn.addEventListener("click", () => {
        yearly = !yearly; // state change

        if (!yearly) {
          // Dot left side
          dot.style.transform = "translateX(-15px)";

          // Yearly price
          price1.innerHTML = `<span>$</span>199.99`;
          price2.innerHTML = `<span>$</span>249.99`;
          price3.innerHTML = `<span>$</span>399.99`;
        } else {
          // Dot right side
          dot.style.transform = "translateX(0)";

          // Monthly price
          price1.innerHTML = `<span>$</span>19.99`;
          price2.innerHTML = `<span>$</span>24.99`;
          price3.innerHTML = `<span>$</span>39.99`;
        }
      });
    </script>
  </body>
</html>
