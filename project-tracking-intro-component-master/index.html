<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Frontend mentor challange" />

    <meta name="title" content="Frontend mentor challange" />
    <link rel="stylesheet" href="index.css" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://scontent.fdac138-1.fna.fbcdn.net/v/t39.30808-6/504277832_3201268406688328_2665400811850357163_n.jpg?_nc_cat=108&ccb=1-7&_nc_sid=53a332&_nc_ohc=RsQ8FB9grKkQ7kNvwGonLMG&_nc_oc=AdmPd8GCYTAODMd6pz2WVgQdmMwXvR1qCrCjHScIpVi03gTbsSe_AlrmKGtdr-cMtVU&_nc_zt=23&_nc_ht=scontent.fdac138-1.fna&_nc_gid=tRrU1h3rBbsq0J3qFtLYpA&_nc_ss=8&oh=00_AfwyqxVwC123F9IEQQdCB32iwUF2d3SM4esVq7Cn0kMLeA&oe=69BDCFA6"
    />
    <!-- font awesome cdn   --------------------------------->

    <!-- this is google font section   --------------------------------->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- ionicon link   --------------------------------->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/ionicons/7.4.0/esm/ionicons.min.js"
      integrity="sha512-heZj7rPbZHWyOEhE34vsJkzj2DKK2mZ9D3jjMkXQJ0uMGu/m5iOty+le26NL1eFZ5+qa4XBYcflwYwITwCWufw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- favicon section   --------------------------------->
    <link
      rel="shortcut icon"
      href="https://framerusercontent.com/images/QbZPUDfFXUG8DRCcKmLXFnnmWA.png"
      type="image/x-icon"
    />
    <script src="https://unpkg.com/scrollreveal@4.0.0/dist/scrollreveal.min.js"></script>

    <title>Frontend Mentor | Project tracking intro component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body>
    <div class="box"></div>
    <div id="mobile">
      <div class="mob-nav">
        <a href="">product</a>
          <a href="">feature</a>
          <a href="">pricing</a>
          <a href="" class="login">login</a>

      </div>
    </div>
    <section>
      <div class="navigator">
        <img src="images/logo.svg" alt="" />
        <div class="nav">
          <a href="">product</a>
          <a href="">feature</a>
          <a href="">pricing</a>
          <div class="dot"></div>
          <a href="">login</a>
         
        </div>
         <div id="menu">
          <img src="images/icon-hamburger.svg" alt="" class="hamburger">
          <img src="images/icon-close.svg" alt="" class="closed">
        </div>
        
      </div>

      <div class="hero">
        <div class="hero-container">
          <div class="hero-card">
            <h4><span>new</span><span class="h4">Monograph Dashboard</span></h4>
            <h1>Powerful insights into your team</h1>
            <p>Project planning and time tracking for agile teams</p>
            <div class="btn-grp">
              <button>Schedule a demo</button>
              <button>to see a live preview</button>
            </div>
          </div>
          <div class="heroImg">
            <img src="images/illustration-devices.svg" alt="" />
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="#">Your Name Here</a>.
      </p>
    </footer>

    <script>
      const mobile = document.querySelector("#mobile");
      const hamburger = document.querySelector(".hamburger");
      const closed = document.querySelector(".closed");

      hamburger.addEventListener("click", () => {
        mobile.style.top = "20%";
        hamburger.style.display = "none";
        closed.style.display = "block";
      });
      closed.addEventListener("click", () => {
        mobile.style.top = "-100%";
        hamburger.style.display = "block";
        closed.style.display = "none";
      })

    </script>
  </body>
</html>
