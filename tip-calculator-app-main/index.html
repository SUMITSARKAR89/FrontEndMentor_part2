    <title>Frontend Mentor | Tip calculator app</title>

  </head>
  <body>
    <h1><span>spli</span><span>tter</span></h1>

    <section>
      <div class="calculaorApp">
        <div class="inputContainer">
          <div class="input-card">
            <label for="">bill</label>
            <input type="number" name="" id="bill" placeholder="00" />
            <i class="fa-solid fa-dollar-sign"></i>
          </div>
          <div class="btn-card">
            <label for="">select tip %</label>
            <div id="btn-grp">
              <span class="tip">5%</span>
              <span class="tip">10%</span>
              <span class="tip">15%</span>
              <span class="tip">25%</span>
              <span class="tip">50%</span>
              <input
                type="number"
                name=""
                id="custom"
                placeholder="CUSTOM"
                class="custom"
              />
            </div>
          </div>
          <div class="people-card">
            <label for="">number of people</label>
            <input type="number" name="" id="people" placeholder="0" />
            <i class="fa-solid fa-user"></i>
          </div>
        </div>
        <div class="resultContainer">
          <div class="tip-card">
            <p>tip amount <small>/ person</small></p>
            <span id="tip">$0.00</span>
          </div>
          <div class="total-card">
            <p>total <small>/ person</small></p>
            <span id="total">$0.00</span>
          </div>

          <button type="reset" id="btn">reset</button>
          <input type="button" value="print" id="print" />
        </div>
      </div>
    </section>
    <div class="popup" id="popup">
      <div class="popup-card">
        <span class="close" id="close">&times;</span>

        <h3>Bill Summary</h3>
        <p id="pBill"></p>
        <p id="pPeople"></p>
        <p id="pCustom"></p>
        <p id="pTipsBtn"></p>
        <p id="pTip"></p>
        <p id="pTotal"></p>
      </div>
    </div>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">sumit sarkar</a>.
    </footer>

    <script>
      const tipsBtn = document.querySelectorAll(".tip");
      const customInput = document.getElementById("custom");
      const billInput = document.getElementById("bill");
      const peopleInput = document.getElementById("people");

      const reset = document.getElementById("btn");
      const tip = document.getElementById("tip");
      const total = document.getElementById("total");

      let index = 0;

      //===========this is all btn========
      tipsBtn.forEach((btn) => {
        btn.addEventListener("click", () => {
          tipsBtn.forEach((b) => {
            b.classList.remove("active");
          });
          btn.classList.add("active");

          let text = btn.innerText;
          let textReplace = text.replace("%", "");
          index = Number(textReplace);
          calculaor();
        });
      });
      //===========this is custom input========
      customInput.addEventListener("input", () => {
        tipsBtn.forEach((b) => {
          b.classList.remove("active");
        });

        let customValue = customInput.value;
        index = Number(customValue);
        calculaor();
      });

      function calculaor() {
        let billValue = billInput.value;
        let peopleValue = peopleInput.value;
        let people = Number(peopleValue);
        let bill = Number(billValue);

        if (bill > 0 && people > 0) {
          let indexTip = (bill * (index / 100)) / people;
          let indexTotal = bill / people + indexTip;

          tip.innerText = "$" + indexTip.toFixed(2);
          total.innerText = "$" + indexTotal.toFixed(2);
        }
      }

      //=========== Inputs ===========
      billInput.addEventListener("input", calculaor);
      peopleInput.addEventListener("input", calculaor);
      //=========== Reset ===========
      reset.addEventListener("click", () => {
        tipsBtn.forEach((b) => {
          b.classList.remove("active");
        });
        billInput.value = "";
        customInput.value = "";
        peopleInput.value = "";
        tip.innerText = "$ 0.00";
        total.innerText = "$ 0.00";
      });

      const popup = document.getElementById("popup");
      const closeBtn = document.getElementById("close");
      const print = document.getElementById("print");

      const pBill = document.getElementById("pBill");
      const pPeople = document.getElementById("pPeople");
      const pCustom = document.getElementById("pCustom");
      
      const pTip = document.getElementById("pTip");
      const pTotal = document.getElementById("pTotal");

      print.addEventListener("click", () => {
        popup.style.display = "flex";

        let bill = billInput.value;
        let people = peopleInput.value;
        let custom = customInput.value;

        pBill.innerText = "Bill Amount : $" + bill;
        pPeople.innerText = "Total People : " + people;
        pCustom.innerText = "Custom Tips : $ " + custom;
        pTip.innerText = "Tips Per Person : " + tip.innerText;
        pTotal.innerText = "Total Per Person : " + total.innerText;
        

        
        tipsBtn.forEach((b) => {
          b.classList.remove("active");
        });
        billInput.value = "";
        customInput.value = "";
        peopleInput.value = "";
        tip.innerText = "$ 0.00";
        total.innerText = "$ 0.00";


      });
      closeBtn.addEventListener("click", () => {
        popup.style.display = "none";
      });
    </script>
  </body>
</html>
